<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no">
    <title>LUMORA - 3D Card Stack View</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Setup the 3D viewing container perspective */
        .perspective-2000 {
            perspective: 2000px;
        }
        .preserve-3d {
            transform-style: preserve-3d;
        }
        /* Smooth transitions for changing stack layer placements */
        .stack-transition {
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.15), opacity 0.5s ease;
        }
    </style>
</head>

<body class="bg-slate-900 w-screen h-screen flex items-center justify-center overflow-hidden select-none antialiased">

    <div class="w-full h-full p-4 sm:p-6 md:p-8 flex items-center justify-center">
        
        <div class="perspective-2000 w-full h-full flex items-center justify-center relative">
            
            <div id="cardStack" class="preserve-3d relative w-full h-full flex items-center justify-center">
                
                <div id="cardTop" class="card stack-transition absolute w-full h-full cursor-grab active:cursor-grabbing flex flex-col bg-transparent">
                    <div class="relative w-full h-full flex items-center justify-center">
                        <div id="topWrapper" class="relative max-w-full max-h-full aspect-[456.875/645.625] h-auto md:h-full rounded-2xl overflow-hidden shadow-2xl border border-slate-700/20">
                            <img id="topImg" src="page_pictures/PDF LUMORA-01.webp" alt="Top Slide Layer" class="w-full h-full object-contain pointer-events-none rounded-2xl">
                            <div class="absolute bottom-4 right-4 font-bold text-xs text-slate-400 bg-slate-900/75 px-3 py-1.5 rounded-xl backdrop-blur-md border border-white/10 shadow-lg">
                                Page <span id="topCounter">0</span>
                            </div>
                        </div>
                    </div>
                </div>

                <div id="cardMiddle" class="card stack-transition absolute w-full h-full flex flex-col bg-transparent">
                    <div class="relative w-full h-full flex items-center justify-center">
                        <div class="relative max-w-full max-h-full aspect-[456.875/645.625] h-auto md:h-full rounded-2xl overflow-hidden shadow-xl border border-slate-700/20">
                            <img id="middleImg" src="page_pictures/PDF LUMORA-02.webp" alt="Middle Slide Layer" class="w-full h-full object-contain pointer-events-none rounded-2xl">
                            <div class="absolute bottom-4 right-4 font-bold text-xs text-slate-400 bg-slate-900/75 px-3 py-1.5 rounded-xl backdrop-blur-md border border-white/10 shadow-lg">
                                Page <span id="middleCounter">1</span>
                            </div>
                        </div>
                    </div>
                </div>

                <div id="cardBottom" class="card stack-transition absolute w-full h-full flex flex-col bg-transparent">
                    <div class="relative w-full h-full flex items-center justify-center">
                        <div class="relative max-w-full max-h-full aspect-[456.875/645.625] h-auto md:h-full rounded-2xl overflow-hidden shadow-lg border border-slate-700/20">
                            <img id="bottomImg" src="page_pictures/PDF LUMORA-03.webp" alt="Bottom Slide Layer" class="w-full h-full object-contain pointer-events-none rounded-2xl">
                            <div class="absolute bottom-4 right-4 font-bold text-xs text-slate-400 bg-slate-900/75 px-3 py-1.5 rounded-xl backdrop-blur-md border border-white/10 shadow-lg">
                                Page <span id="bottomCounter">2</span>
                            </div>
                        </div>
                    </div>
                </div>

            </div>

        </div>
    </div>

    <div id="toastMessage" class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-slate-950/80 text-slate-200 text-xs md:text-sm font-medium tracking-wide px-6 py-3 rounded-full pointer-events-none z-50 shadow-xl border border-white/10 backdrop-blur-md transition-opacity duration-1000 ease-in-out">
         Swipe left or right on the card to flip through the deck stack
    </div>

    <script>
        const pageImages = [
            "page_pictures/PDF LUMORA-01.webp", "page_pictures/PDF LUMORA-02.webp",
            "page_pictures/PDF LUMORA-03.webp", "page_pictures/PDF LUMORA-04.webp",
            "page_pictures/PDF LUMORA-05.webp", "page_pictures/PDF LUMORA-06.webp",
            "page_pictures/PDF LUMORA-07.webp", "page_pictures/PDF LUMORA-08.webp",
            "page_pictures/PDF LUMORA-09.webp", "page_pictures/PDF LUMORA-10.webp",
            "page_pictures/PDF LUMORA-11.webp", "page_pictures/PDF LUMORA-12.webp",
            "page_pictures/PDF LUMORA-13.webp", "page_pictures/PDF LUMORA-14.webp",
            "page_pictures/PDF LUMORA-15.webp", "page_pictures/PDF LUMORA-16.webp",
            "page_pictures/PDF LUMORA-17.webp", "page_pictures/PDF LUMORA-18.webp",
            "page_pictures/PDF LUMORA-19.webp", "page_pictures/PDF LUMORA-20.webp",
            "page_pictures/PDF LUMORA-21.webp", "page_pictures/PDF LUMORA-22.webp",
            "page_pictures/PDF LUMORA-23.webp", "page_pictures/PDF LUMORA-24.webp",
            "page_pictures/PDF LUMORA-25.webp", "page_pictures/PDF LUMORA-26.webp",
            "page_pictures/PDF LUMORA-27.webp", "page_pictures/PDF LUMORA-28.webp",
            "page_pictures/PDF LUMORA-29.webp"
        ];

        const stackContainer = document.getElementById('cardStack');
        const cardTop = document.getElementById('cardTop');
        const topWrapper = document.getElementById('topWrapper');
        const cardMiddle = document.getElementById('cardMiddle');
        const cardBottom = document.getElementById('cardBottom');

        const topImg = document.getElementById('topImg');
        const middleImg = document.getElementById('middleImg');
        const bottomImg = document.getElementById('bottomImg');

        const topCounter = document.getElementById('topCounter');
        const middleCounter = document.getElementById('middleCounter');
        const bottomCounter = document.getElementById('bottomCounter');

        let currentPageIndex = 0;
        let isAnimating = false;
        let isDragging = false;
        let isMultiTouchDetected = false;
        
        let dragStartX = 0;
        let dragStartY = 0;
        let dragStartTime = 0; 
        
        const dragMinDistance = 60;   
        const dragMinVelocity = 0.45; 

        function renderStackPositions(forceInstant = false) {
            if (forceInstant) {
                cardTop.style.transition = 'none';
                cardMiddle.style.transition = 'none';
                cardBottom.style.transition = 'none';
            }

            // Top Card Setup
            cardTop.style.transform = `translate3d(0, 0px, 0px) rotateX(4deg) rotateY(-2deg) rotateZ(0deg) scale(1)`;
            cardTop.style.zIndex = '30';
            cardTop.style.opacity = '1';
            cardTop.style.pointerEvents = 'auto';

            // Middle Card Setup
            cardMiddle.style.transform = `translate3d(0, 14px, -50px) rotateX(4deg) rotateY(-2deg) rotateZ(-0.7deg) scale(0.96)`;
            cardMiddle.style.zIndex = '20';
            cardMiddle.style.opacity = '1';
            cardMiddle.style.pointerEvents = 'none';

            // Bottom Card Setup
            cardBottom.style.transform = `translate3d(0, 28px, -100px) rotateX(4deg) rotateY(-2deg) rotateZ(1deg) scale(0.92)`;
            cardBottom.style.zIndex = '10';
            cardBottom.style.opacity = '1';
            cardBottom.style.pointerEvents = 'none';
        }

        function handleDragStart(clientX, clientY) {
            if (isAnimating) return;
            isDragging = true;
            isMultiTouchDetected = false;
            dragStartX = clientX;
            dragStartY = clientY;
            dragStartTime = performance.now();

            cardTop.style.transition = 'none';
            handleDragMove(clientX, clientY);

            const toastMessage = document.getElementById('toastMessage');
            if (toastMessage) {
                toastMessage.classList.add('opacity-0');
                setTimeout(() => toastMessage.remove(), 1000);
            }
        }

        function handleDragMove(clientX, clientY) {
            if (!isDragging || isAnimating || isMultiTouchDetected) return;

            const deltaX = clientX - dragStartX;
            const deltaY = clientY - dragStartY;

            const rect = topWrapper.getBoundingClientRect();
            const cardCenterX = rect.left + rect.width / 2;
            const cardCenterY = rect.top + rect.height / 2;

            const pressRelativeX = (clientX - cardCenterX) / (rect.width / 2);
            const pressRelativeY = (clientY - cardCenterY) / (rect.height / 2);

            const maxTiltAngle = 12; 
            const tiltY = (deltaX / window.innerWidth) * 20 + (pressRelativeX * maxTiltAngle) - 2;
            const tiltX = -(deltaY / window.innerHeight) * 12 - (pressRelativeY * maxTiltAngle) + 4;
            const rotateZ = (deltaX / window.innerWidth) * 8 + (pressRelativeX * 2);

            cardTop.style.transform = `translate3d(${deltaX}px, ${deltaY * 0.15}px, 40px) rotateX(${tiltX}deg) rotateY(${tiltY}deg) rotateZ(${rotateZ}deg)`;
        }

        function resetCardPosition() {
            cardTop.style.transition = 'transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
            renderStackPositions();
        }

        function handleDragEnd(clientX, clientY) {
            if (!isDragging || isAnimating) return;
            isDragging = false;
            
            if (isMultiTouchDetected) {
                resetCardPosition();
                return;
            }

            const dragEndTime = performance.now();
            const deltaX = clientX - dragStartX;
            const dragDuration = dragEndTime - dragStartTime;
            const dragVelocity = Math.abs(deltaX) / dragDuration;

            if (Math.abs(deltaX) < 10) {
                executeFlyOffCycle(true); 
                return;
            }

            if (Math.abs(deltaX) < dragMinDistance || dragVelocity < dragMinVelocity) {
                resetCardPosition();
                return;
            }

            executeFlyOffCycle(deltaX < 0);
        }

        function executeFlyOffCycle(isSwipeLeft) {
            isAnimating = true;

            let flyOutX = isSwipeLeft ? -window.innerWidth * 1.2 : window.innerWidth * 1.2;
            let finalRotation = isSwipeLeft ? -25 : 25;

            let nextIndex;
            if (isSwipeLeft) {
                nextIndex = (currentPageIndex + 1) % pageImages.length;
            } else {
                nextIndex = (currentPageIndex - 1 + pageImages.length) % pageImages.length;
            }

            const middleIndex = (nextIndex + 1) % pageImages.length;
            const bottomIndex = (nextIndex + 2) % pageImages.length;

            // 1. Throw top card off visual viewport
            cardTop.style.transition = 'transform 0.4s ease-in, opacity 0.4s ease';
            cardTop.style.transform = `translate3d(${flyOutX}px, 0, 80px) rotateX(8deg) rotateY(${finalRotation}deg) rotateZ(${finalRotation * 0.3}deg)`;
            cardTop.style.opacity = '0';

            // 2. Animate secondary background layers upward smoothly
            cardMiddle.style.transition = 'transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.15)';
            cardMiddle.style.transform = `translate3d(0, 0px, 0px) rotateX(4deg) rotateY(-2deg) rotateZ(0deg) scale(1)`;

            cardBottom.style.transition = 'transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.15)';
            cardBottom.style.transform = `translate3d(0, 14px, -50px) rotateX(4deg) rotateY(-2deg) rotateZ(-0.7deg) scale(0.96)`;

            // 3. Complete asset content swap midway out of sight
            setTimeout(() => {
                currentPageIndex = nextIndex;

                topImg.src = pageImages[nextIndex];
                topCounter.innerText = nextIndex;

                middleImg.src = pageImages[middleIndex];
                middleCounter.innerText = middleIndex;

                bottomImg.src = pageImages[bottomIndex];
                bottomCounter.innerText = bottomIndex;

                cardTop.style.transition = 'none';
                cardTop.style.transform = `translate3d(0, 28px, -100px) rotateX(4deg) rotateY(-2deg) rotateZ(1deg) scale(0.92)`;
                cardTop.style.opacity = '1'; 
                
                cardTop.offsetHeight;

                renderStackPositions(true);

                cardTop.offsetHeight;

                cardTop.style.transition = 'transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.15), opacity 0.5s ease';
                cardMiddle.style.transition = 'transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.15), opacity 0.5s ease';
                cardBottom.style.transition = 'transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.15), opacity 0.5s ease';

                isAnimating = false;

                const prefetchCache = new Image();
                prefetchCache.src = pageImages[(bottomIndex + 1) % pageImages.length];

            }, 400);
        }

        // 📱 MOBILE TOUCH HANDLERS
        stackContainer.addEventListener('touchstart', (e) => {
            if (e.touches.length > 1) {
                isMultiTouchDetected = true;
                if (isDragging) {
                    isDragging = false;
                    resetCardPosition();
                }
                return;
            }
            handleDragStart(e.touches[0].clientX, e.touches[0].clientY);
        }, { passive: true });

        window.addEventListener('touchmove', (e) => {
            if (e.touches.length > 1) {
                isMultiTouchDetected = true;
                if (isDragging) {
                    isDragging = false;
                    resetCardPosition();
                }
                return;
            }
            if (isDragging && !isMultiTouchDetected) {
                handleDragMove(e.touches[0].clientX, e.touches[0].clientY);
            }
        }, { passive: false });

        window.addEventListener('touchend', (e) => {
            if (isDragging) {
                if (e.touches.length > 0 || isMultiTouchDetected) {
                    isMultiTouchDetected = true;
                    isDragging = false;
                    resetCardPosition();
                    return;
                }
                if (e.changedTouches.length > 0) {
                    handleDragEnd(e.changedTouches[0].clientX, e.changedTouches[0].clientY);
                }
            }
        });

        stackContainer.addEventListener('mousedown', (e) => {
            handleDragStart(e.clientX, e.clientY);
        });
        window.addEventListener('mousemove', (e) => {
            handleDragMove(e.clientX, e.clientY);
        });
        window.addEventListener('mouseup', (e) => {
            handleDragEnd(e.clientX, e.clientY);
        });

        stackContainer.addEventListener('dragstart', (e) => e.preventDefault());

        renderStackPositions();

        const toastMessage = document.getElementById('toastMessage');
        setTimeout(() => {
            if (toastMessage && !isAnimating && !isDragging) {
                toastMessage.classList.add('opacity-0');
                setTimeout(() => toastMessage.remove(), 1000);
            }
        }, 3500);
    </script>
</body>

</html>
