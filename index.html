<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no">
    <title>LUMORA - 3D Deck Swipe View</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Setup the 3D viewing container perspective */
        .perspective-2000 {
            perspective: 2000px;
        }
        /* Smooth fallback timing for spring-back transitions */
        .spring-transition {
            transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
    </style>
</head>

<body class="bg-slate-900 w-screen h-screen flex items-center justify-center overflow-hidden select-none antialiased">

    <div class="w-full h-full p-4 sm:p-6 md:p-8 flex items-center justify-center">
        
        <div class="perspective-2000 w-full h-full flex items-center justify-center relative">
            
            <div id="presentationPage" class="spring-transition relative w-full h-full max-w-full max-h-full aspect-[456.875/645.625] cursor-grab active:cursor-grabbing shadow-2xl rounded-2xl border border-slate-700/30 bg-slate-950 overflow-hidden flex flex-col">
                
                <div class="w-full h-full flex items-center justify-center">
                    <img id="frontImg" src="page_pictures/PDF LUMORA-01.webp" alt="Active Page Image" class="w-full h-full object-contain pointer-events-none">
                </div>
                
                <div class="absolute bottom-4 right-4 font-bold text-xs text-slate-400 bg-slate-900/60 px-2.5 py-1 rounded-md backdrop-blur-md border border-white/5">
                    Page <span id="frontPageCount">0</span>
                </div>

            </div>

        </div>
    </div>

    <div id="toastMessage" class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-slate-950/80 text-slate-200 text-xs md:text-sm font-medium tracking-wide px-6 py-3 rounded-full pointer-events-none z-50 shadow-xl border border-white/10 backdrop-blur-md transition-opacity duration-1000 ease-in-out">
         Swipe left or right on the card to flip through pages
    </div>

    <script>
        const pageImages = [
            "page_pictures/PDF LUMORA-01.webp", "page_pictures/PDF LUMORA-02.webp",
            "page_pictures/PDF LUMORA-03.webp", "page_pictures/PDF LUMORA-04.webp",
            "page_pictures/PDF LUMORA-05.webp", "page_pictures/PDF LUMORA-06.webp",
            "page_pictures/PDF LUMORA-07.webp", "page_pictures/PDF LUMORA-08.webp",
            "page_pictures/PDF LUMORA-09.webp", "page_pictures/PDF LUMORA-10.webp",
            "page_pictures/PDF LUMORA-11.webp", "page_pictures/PDF LUMORA-12.webp",
            "page_pictures/PDF LUMORA-13.webp", "page_pictures/PDF LUMORA-14.webp",
            "page_pictures/PDF LUMORA-15.webp", "page_pictures/PDF LUMORA-16.webp",
            "page_pictures/PDF LUMORA-17.webp", "page_pictures/PDF LUMORA-18.webp",
            "page_pictures/PDF LUMORA-19.webp", "page_pictures/PDF LUMORA-20.webp",
            "page_pictures/PDF LUMORA-21.webp", "page_pictures/PDF LUMORA-22.webp",
            "page_pictures/PDF LUMORA-23.webp", "page_pictures/PDF LUMORA-24.webp",
            "page_pictures/PDF LUMORA-25.webp", "page_pictures/PDF LUMORA-26.webp",
            "page_pictures/PDF LUMORA-27.webp", "page_pictures/PDF LUMORA-28.webp",
            "page_pictures/PDF LUMORA-29.webp"
        ];

        const deckCard = document.getElementById('presentationPage');
        const frontImg = document.getElementById('frontImg');
        const frontCounter = document.getElementById('frontPageCount');

        let currentPageIndex = 0;
        let isAnimating = false;
        let isDragging = false;
        
        // Tracking metrics
        let dragStartX = 0;
        let dragStartY = 0;
        let dragStartTime = 0; 
        
        const dragMinDistance = 60;   
        const dragMinVelocity = 0.45; 

        // 🛠️ DRAG/SWIPE INITIALIZATION
        function handleDragStart(clientX, clientY) {
            if (isAnimating) return;
            isDragging = true;
            dragStartX = clientX;
            dragStartY = clientY;
            dragStartTime = performance.now();

            // Disable spring transition classes so the card responds instantly to the finger/cursor
            deckCard.style.transition = 'none';

            // Fade toast instructions out
            const toastMessage = document.getElementById('toastMessage');
            if (toastMessage) {
                toastMessage.classList.add('opacity-0');
                setTimeout(() => toastMessage.remove(), 1000);
            }
        }

        // 🔄 REAL-TIME DRAG TRACKING WITH 3D TILT EFFECT
        function handleDragMove(clientX, clientY) {
            if (!isDragging || isAnimating) return;

            const deltaX = clientX - dragStartX;
            const deltaY = clientY - dragStartY;

            // Generate custom rotational coordinates based on displacement
            const tiltY = (deltaX / window.innerWidth) * 45;  // Adjust number for extreme or subtle horizontal tilt
            const tiltX = -(deltaY / window.innerHeight) * 30; // Adjust number for extreme or subtle vertical tilt

            // Live-render the 3D position state
            deckCard.style.transform = `translate3d(${deltaX}px, ${deltaY * 0.2}px, 0) rotateX(${tiltX}deg) rotateY(${tiltY}deg)`;
        }

        // 🏁 EVALUATE SWIPE OUTCOME ON RELEASE
        function handleDragEnd(clientX, clientY) {
            if (!isDragging || isAnimating) return;
            isDragging = false;
            
            const dragEndTime = performance.now();
            const deltaX = clientX - dragStartX;
            const dragDuration = dragEndTime - dragStartTime;
            const dragVelocity = Math.abs(deltaX) / dragDuration;

            // 🛑 GESTURE REJECTED: Return smoothly back to center if swipe was too weak or slow
            if (Math.abs(deltaX) < dragMinDistance || dragVelocity < dragMinVelocity) {
                deckCard.style.transition = 'transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
                deckCard.style.transform = 'translate3d(0, 0, 0) rotateX(0deg) rotateY(0deg)';
                return;
            }

            // 👍 GESTURE VALIDATED: Trigger 3D Fly-Off Animation
            isAnimating = true;
            let nextPageIndex;
            let flyOutX = deltaX > 0 ? window.innerWidth * 1.2 : -window.innerWidth * 1.2;
            let finalRotation = deltaX > 0 ? 45 : -45;

            if (deltaX < 0) {
                // 👈 SWIPE LEFT = GO TO NEXT PAGE
                nextPageIndex = (currentPageIndex + 1) % pageImages.length;
            } else {
                // 👉 SWIPE RIGHT = GO TO PREVIOUS PAGE
                nextPageIndex = (currentPageIndex - 1 + pageImages.length) % pageImages.length;
            }

            const prefetchIndex = (nextPageIndex + 1) % pageImages.length;

            // Fly the card completely off screen
            deckCard.style.transition = 'transform 0.4s ease-in';
            deckCard.style.transform = `translate3d(${flyOutX}px, 0, 0) rotateX(0deg) rotateY(${finalRotation}deg)`;

            // Swap slides out-of-view and slide back into center from the opposite side
            setTimeout(() => {
                // Sync new asset content
                frontImg.src = pageImages[nextPageIndex];
                frontCounter.innerText = nextPageIndex;
                currentPageIndex = nextPageIndex;

                // Teleport the card to the incoming screen boundary hidden buffer silently
                deckCard.style.transition = 'none';
                deckCard.style.transform = `translate3d(${-flyOutX * 0.5}px, 0, -500px) rotateX(0deg) rotateY(${-finalRotation}deg)`;

                // Force layout hardware refresh sequence context
                deckCard.offsetHeight;

                // Smoothly spring back onto center deck stack coordinates
                deckCard.style.transition = 'transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
                deckCard.style.transform = 'translate3d(0, 0, 0) rotateX(0deg) rotateY(0deg)';

                setTimeout(() => {
                    isAnimating = false;
                    // Run continuous asynchronous background asset cache preloader
                    const nextImageCache = new Image();
                    nextImageCache.src = pageImages[prefetchIndex];
                }, 600);

            }, 400); // perfectly timed with the fly-off animation duration
        }

        // 📱 TOUCH LISTENERS (MOBILE)
        deckCard.addEventListener('touchstart', (e) => {
            handleDragStart(e.touches[0].clientX, e.touches[0].clientY);
        }, { passive: true });

        window.addEventListener('touchmove', (e) => {
            if (isDragging) handleDragMove(e.touches[0].clientX, e.touches[0].clientY);
        }, { passive: false });

        window.addEventListener('touchend', (e) => {
            if (isDragging && e.changedTouches.length > 0) {
                handleDragEnd(e.changedTouches[0].clientX, e.changedTouches[0].clientY);
            }
        });

        // 💻 MOUSE LISTENERS (DESKTOP)
        deckCard.addEventListener('mousedown', (e) => {
            handleDragStart(e.clientX, e.clientY);
        });

        window.addEventListener('mousemove', (e) => {
            handleDragMove(e.clientX, e.clientY);
        });

        window.addEventListener('mouseup', (e) => {
            handleDragEnd(e.clientX, e.clientY);
        });

        // Block native desktop ghost outline artifacts from interrupting gesture coordinates
        deckCard.addEventListener('dragstart', (e) => e.preventDefault());

        // Automatically fade out notification toast if untouched after 3.5s
        const toastMessage = document.getElementById('toastMessage');
        setTimeout(() => {
            if (toastMessage && !isAnimating && !isDragging) {
                toastMessage.classList.add('opacity-0');
                setTimeout(() => toastMessage.remove(), 1000);
            }
        }, 3500);
    </script>
</body>

</html>
